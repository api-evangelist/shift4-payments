                metadata:
                  type: object
                  additionalProperties: { type: string }
      responses:
        '200':
          description: Payment link created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  url: { type: string, format: uri }
                  amount: { type: integer }
                  currency: { type: string }
                  created: { type: integer, format: int64 }
