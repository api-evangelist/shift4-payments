openapi: 3.0.3
info:
  title: Shift4 Payments API
  description: >-
    The Shift4 Payments API enables merchants and platforms to accept and manage
    payments, including one-time charges, refunds, customers, cards, tokenization,
    subscriptions, plans, payment methods, payment links, checkout sessions, fraud
    warnings, blacklist rules, disputes, file uploads, payouts, webhook endpoints,
    and events. Endpoints, parameters, and resource shapes are extracted from the
    public Shift4 documentation at https://dev.shift4.com/docs/api and the official
    open-source Shift4 SDKs (Java, Node, Python, Ruby, PHP, .NET, iOS, Android,
    WooCommerce, Salesforce B2C) maintained at https://github.com/shift4developer.
  version: '1.0'
  contact:
    name: Shift4 Developer Support
    email: devsupport@shift4.com
    url: https://dev.shift4.com
  license:
    name: Documentation
    url: https://dev.shift4.com/docs
servers:
  - url: https://api.shift4.com
    description: Production
tags:
  - name: Charges
    description: Create, retrieve, update, capture, and list charges.
  - name: Refunds
    description: Refund charges and manage refund records.
  - name: Customers
    description: Create, retrieve, update, delete, and list customers.
  - name: Cards
    description: Manage saved cards on customer records.
  - name: Tokens
    description: Tokenize card data for safe transmission.
  - name: Subscriptions
    description: Create and manage recurring subscriptions for customers.
  - name: Plans
    description: Define recurring billing plans used by subscriptions.
  - name: Payment Methods
    description: Create and retrieve alternative payment methods (Apple Pay, Google Pay, 3D Secure, etc.).
  - name: Payment Links
    description: Create and retrieve hosted payment links.
  - name: Checkout Sessions
    description: Create hosted checkout sessions for drop-in payment acceptance.
  - name: Credits
    description: Send funds (credits) to recipients.
  - name: Disputes
    description: Retrieve and respond to chargeback disputes.
  - name: Fraud Warnings
    description: Retrieve early-warning fraud notifications.
  - name: Blacklist
    description: Manage blacklist rules for fraud prevention.
  - name: File Uploads
    description: Upload files such as dispute evidence.
  - name: Payouts
    description: Retrieve scheduled and historical payouts to bank accounts.
  - name: Webhook Endpoints
    description: Register and manage webhook endpoints.
  - name: Events
    description: Retrieve event records that drive webhooks.
security:
  - BasicAuth: []
paths:
  /charges:
    post:
      tags: [Charges]
      summary: Create a Charge
      operationId: createCharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeRequest'
      responses:
        '200':
          description: Charge created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Charges]
      summary: List Charges
      operationId: listCharges
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/StartingAfter'
        - $ref: '#/components/parameters/EndingBefore'
      responses:
        '200':
          description: A list of charges.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChargeList'
  /charges/{chargeId}:
    parameters:
      - name: chargeId
        in: path
        required: true
        schema: { type: string }
    get:
      tags: [Charges]
      summary: Retrieve a Charge
      operationId: getCharge
      responses:
        '200':
          description: A charge object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
    post:
      tags: [Charges]
      summary: Update a Charge
      operationId: updateCharge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChargeUpdateRequest'
      responses:
        '200':
          description: Updated charge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
  /charges/{chargeId}/capture:
    parameters:
      - name: chargeId
        in: path
        required: true
        schema: { type: string }
    post:
      tags: [Charges]
      summary: Capture a Charge
      operationId: captureCharge
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CaptureRequest'
      responses:
        '200':
          description: Captured charge.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Charge'
