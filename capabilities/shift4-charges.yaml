    resources:
    - path: /v1/charges
      name: charges
      description: REST surface for charges.
      operations:
      - method: POST
        name: createcharge
        description: Create a Charge
        call: shift4-charges.createcharge
        with:
          body: rest.body
        outputParameters:
        - type: object
