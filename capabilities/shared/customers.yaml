naftiko: "1.0.0-alpha1"

info:
  label: "Shift4 Customers API"
  description: >-
    Create, retrieve, update, delete, and list Shift4 customers. Customers
    optionally hold one or more saved cards.
  tags:
    - Shift4
    - Customers
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      SHIFT4_API_KEY: SHIFT4_API_KEY

capability:
  consumes:
    - type: http
      namespace: shift4-customers
      baseUri: https://api.shift4.com
      authentication:
        type: basic
        username: "{{SHIFT4_API_KEY}}"
        password: ""
      resources:
        - name: customers
          path: /customers
          operations:
            - name: list-customers
              method: GET
              description: "List customers."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-customer
              method: POST
              description: "Create a customer."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  description: "{{tools.description}}"
        - name: customer
          path: /customers/{customer}
          operations:
            - name: get-customer
              method: GET
              description: "Retrieve a customer by ID."
              inputParameters:
                - name: customer
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-customer
              method: POST
              description: "Update a customer."
              inputParameters:
                - name: customer
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-customer
              method: DELETE
              description: "Delete a customer."
              inputParameters:
                - name: customer
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9103
      namespace: shift4-customers-mcp
      transport: http
      tools:
        - name: list-customers
          description: "List Shift4 customers."
          hints: { readOnly: true }
          call: "shift4-customers.list-customers"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-customer
          description: "Create a Shift4 customer."
          hints: { readOnly: false, destructive: false }
          call: "shift4-customers.create-customer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-customer
          description: "Retrieve a Shift4 customer by ID."
          hints: { readOnly: true }
          call: "shift4-customers.get-customer"
          with:
            customer: "tools.customer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-customer
          description: "Update a Shift4 customer."
          hints: { readOnly: false, destructive: false }
          call: "shift4-customers.update-customer"
          with:
            customer: "tools.customer"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-customer
          description: "Delete a Shift4 customer."
          hints: { readOnly: false, destructive: true }
          call: "shift4-customers.delete-customer"
          with:
            customer: "tools.customer"
          outputParameters:
            - type: object
              mapping: "$."
