naftiko: "1.0.0-alpha1"

info:
  label: "Shift4 Subscriptions and Plans API"
  description: >-
    Manage Shift4 plans (recurring billing definitions) and subscriptions
    (per-customer recurring billing instances).
  tags:
    - Shift4
    - Subscriptions
    - Plans
    - Billing
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      SHIFT4_API_KEY: SHIFT4_API_KEY

capability:
  consumes:
    - type: http
      namespace: shift4-subscriptions
      baseUri: https://api.shift4.com
      authentication:
        type: basic
        username: "{{SHIFT4_API_KEY}}"
        password: ""
      resources:
        - name: plans
          path: /plans
          operations:
            - name: list-plans
              method: GET
              description: "List plans."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-plan
              method: POST
              description: "Create a plan."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: plan
          path: /plans/{plan}
          operations:
            - name: get-plan
              method: GET
              description: "Retrieve a plan by ID."
              inputParameters:
                - name: plan
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-plan
              method: POST
              description: "Update a plan."
              inputParameters:
                - name: plan
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscriptions
          path: /subscriptions
          operations:
            - name: create-subscription
              method: POST
              description: "Create a subscription."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: subscription
          path: /subscriptions/{subscription}
          operations:
            - name: get-subscription
              method: GET
              description: "Retrieve a subscription by ID."
              inputParameters:
                - name: subscription
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: update-subscription
              method: POST
              description: "Update or cancel a subscription."
              inputParameters:
                - name: subscription
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9104
      namespace: shift4-subscriptions-mcp
      transport: http
      tools:
        - name: list-plans
          description: "List Shift4 plans."
          hints: { readOnly: true }
          call: "shift4-subscriptions.list-plans"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-plan
          description: "Create a Shift4 plan."
          hints: { readOnly: false, destructive: false }
          call: "shift4-subscriptions.create-plan"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-subscription
          description: "Create a Shift4 subscription for a customer on a plan."
          hints: { readOnly: false, destructive: false }
          call: "shift4-subscriptions.create-subscription"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-subscription
          description: "Retrieve a Shift4 subscription."
          hints: { readOnly: true }
          call: "shift4-subscriptions.get-subscription"
          with:
            subscription: "tools.subscription"
          outputParameters:
            - type: object
              mapping: "$."
        - name: update-subscription
          description: "Update or cancel a Shift4 subscription."
          hints: { readOnly: false, destructive: false }
          call: "shift4-subscriptions.update-subscription"
          with:
            subscription: "tools.subscription"
          outputParameters:
            - type: object
              mapping: "$."
