naftiko: "1.0.0-alpha1"

info:
  label: "Shift4 Refunds API"
  description: >-
    Issue refunds against Shift4 charges and retrieve refund records.
  tags:
    - Shift4
    - Refunds
    - Payments
  created: "2026-05-05"
  modified: "2026-05-05"

binds:
  - namespace: env
    keys:
      SHIFT4_API_KEY: SHIFT4_API_KEY

capability:
  consumes:
    - type: http
      namespace: shift4-refunds
      baseUri: https://api.shift4.com
      authentication:
        type: basic
        username: "{{SHIFT4_API_KEY}}"
        password: ""
      resources:
        - name: refunds
          path: /refunds
          operations:
            - name: list-refunds
              method: GET
              description: "List refunds."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-refund
              method: POST
              description: "Refund a charge."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  chargeId: "{{tools.chargeId}}"
                  amount: "{{tools.amount}}"
                  reason: "{{tools.reason}}"
        - name: refund
          path: /refunds/{refund}
          operations:
            - name: get-refund
              method: GET
              description: "Retrieve a refund by ID."
              inputParameters:
                - name: refund
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: mcp
      port: 9102
      namespace: shift4-refunds-mcp
      transport: http
      tools:
        - name: list-refunds
          description: "List Shift4 refunds."
          hints: { readOnly: true }
          call: "shift4-refunds.list-refunds"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-refund
          description: "Refund a Shift4 charge."
          hints: { readOnly: false, destructive: false }
          call: "shift4-refunds.create-refund"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-refund
          description: "Retrieve a Shift4 refund by ID."
          hints: { readOnly: true }
          call: "shift4-refunds.get-refund"
          with:
            refund: "tools.refund"
          outputParameters:
            - type: object
              mapping: "$."
