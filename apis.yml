aid: shift4-payments
url: https://raw.githubusercontent.com/api-evangelist/shift4-payments/refs/heads/main/apis.yml
name: Shift4 Payments
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
- Payments
- Fintech
- Commerce
- Checkout
description: Shift4 Payments is a leading integrated payments and commerce technology provider and a Fortune 1000 company.
  The company processes payments for hospitality, retail, gaming, sports, e-commerce, and other verticals, offering checkout
  flows, custom payment forms, hosted UI components, and a developer API that supports global payment methods, subscriptions,
  fraud prevention, and 3D Secure. Developers integrate Shift4 through a REST API, JavaScript library, webhooks, and a sandbox
  testing environment.
